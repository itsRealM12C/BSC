<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BSCode Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ext-language_tools.js"></script>
    <style>
        :root {
            --bg-main: #1e1e1e;
            --bg-tabs: #252526;
            --bg-tab-inactive: #2d2d2d;
            --bg-tab-hover: #2b2d2e;
            --border-color: #333;
            --accent: #007acc;
            --accent-hover: #0062a3;
            --text-main: #d4d4d4;
            --text-muted: #969696;
            --console-bg: #111111;
            --error-color: #f48771;
            --warn-color: #cca700;
            --qml-color: #41cd52;
            --border-line: #1c1c1c;
        }

        body.light-mode {
            --bg-main: #ffffff;
            --bg-tabs: #f3f3f3;
            --bg-tab-inactive: #ececec;
            --bg-tab-hover: #e0e0e0;
            --border-color: #cccccc;
            --text-main: #333333;
            --text-muted: #666666;
            --console-bg: #f9f9f9;
            --border-line: #eaeaea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Header & Tabs */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-tabs);
            border-bottom: 1px solid var(--border-color);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .header::-webkit-scrollbar { display: none; }

        .tabs-container {
            display: flex;
            flex-grow: 1;
            align-items: flex-end;
            min-height: 40px;
        }

        .tab {
            background-color: var(--bg-tab-inactive);
            color: var(--text-muted);
            border: none;
            padding: 8px 14px;
            cursor: pointer;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 13px;
            border-top: 2px solid transparent;
            border-right: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
            touch-action: none;
            transition: background-color 0.2s, color 0.2s;
        }

        .tab:hover { background-color: var(--bg-tab-hover); }
        .tab.active {
            background-color: var(--bg-main);
            color: var(--text-main);
            border-top: 2px solid var(--accent);
        }
        .tab.dragging {
            opacity: 0.5;
            background-color: var(--accent);
        }

        .close-tab {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            transition: background-color 0.2s, color 0.2s;
        }
        .close-tab:hover {
            background-color: rgba(128, 128, 128, 0.2);
            color: #ff5f56;
        }

        .add-tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 0 15px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }
        .add-tab-btn:hover { color: var(--accent); }

        .actions { 
            display: flex; 
            align-items: center; 
            padding-right: 10px; 
            gap: 6px;
        }
        
        .actions button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: 600;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
        }
        .actions button:hover { background-color: var(--accent-hover); }

        /* Configuration Utility Bar */
        .utility-bar {
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            padding: 4px 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
        }
        .utility-bar label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .utility-bar select {
            background: var(--bg-tabs);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            padding: 2px 4px;
            outline: none;
        }

        /* Work Area */
        .workspace {
            display: flex;
            flex: 1;
            flex-direction: column;
            height: calc(100% - 72px);
        }
        @media (min-width: 768px) {
            .workspace { flex-direction: row; }
        }

        /* Editor Frame */
        #editor {
            flex: 1;
            height: 50vh;
            width: 100%;
            position: relative;
        }
        @media (min-width: 768px) {
            #editor { height: 100%; width: 50%; }
        }

        /* Fallback Textarea Engine */
        #fallback-textarea {
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            border: none;
            padding: 15px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        /* Output Viewport & Console Layout */
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-top: 2px solid var(--accent);
            height: 50vh;
            width: 100%;
            background-color: #fff;
        }
        @media (min-width: 768px) {
            .output-panel { height: 100%; width: 50%; border-top: none; border-left: 2px solid var(--accent); }
        }

        #preview {
            flex: 2;
            width: 100%;
            background: transparent;
            border: none;
        }

        .console-container {
            flex: 1;
            background-color: var(--console-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .console-header {
            background: var(--bg-tabs);
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .console-clear-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .console-clear-btn:hover { color: var(--accent); }

        #console-output {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-family: Consolas, monospace;
            font-size: 12px;
            color: var(--text-main);
        }
        .log-line { 
            padding: 3px 0; 
            border-bottom: 1px solid var(--border-line); 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            display: flex; 
            gap: 6px; 
        }
        .log-error { color: var(--error-color); background: rgba(244, 135, 113, 0.05); }
        .log-warn { color: var(--warn-color); background: rgba(204, 167, 0, 0.05); }
        .log-system { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <div class="tabs-container" id="tabs-container"></div>
        <button class="add-tab-btn" onclick="promptNewTab()" title="New File">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <div class="actions">
            <button onclick="runCode()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Build & Run
            </button>
            <button onclick="exportFiles()">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export
            </button>
        </div>
    </div>

    <div class="utility-bar">
        <label>
            <input type="checkbox" id="live-toggle" onchange="toggleLiveMode(this.checked)"> Live Mode
        </label>
        <label>
            <input type="checkbox" id="wrap-toggle" onchange="toggleWordWrap(this.checked)"> Word Wrap
        </label>
        <label>
            Theme:
            <select id="theme-select" onchange="toggleTheme(this.value)">
                <option value="dark" selected>Dark</option>
                <option value="light">Light</option>
            </select>
        </label>
        <label>
            Size:
            <select id="font-size-select" onchange="changeFontSize(this.value)">
                <option value="12px">12px</option>
                <option value="14px" selected>14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
            </select>
        </label>
        <span id="save-status" style="margin-left: auto; font-style: italic; opacity: 0.7;">Ready</span>
    </div>

    <div class="workspace">
        <div id="editor"></div>
        <div class="output-panel">
            <iframe id="preview"></iframe>
            <div class="console-container">
                <div class="console-header">
                    <span>Live Output Log</span>
                    <div class="console-clear-btn" onclick="clearConsole()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        Clear
                    </div>
                </div>
                <div id="console-output"></div>
            </div>
        </div>
    </div>

    <script>
        // Safe Storage Wrappers
        function safeGetItem(key) {
            try { return localStorage.getItem(key); } 
            catch(e) { return null; }
        }
        function safeSetItem(key, val) {
            try { localStorage.setItem(key, val); } 
            catch(e) { /* Ignore - running in memory mode */ }
        }

        // Default Local File Template Architecture (Including QML)
        const defaultFiles = [
            { id: 'f1', name: 'main.qml', type: 'qml', content: 'import QtQuick 2.15\n\nRectangle {\n    width: 400\n    height: 400\n    color: "#222"\n\n    Text {\n        text: "QmlWeb Environment Online"\n        color: "#41cd52"\n        anchors.centerIn: parent\n        font.pixelSize: 20\n    }\n}' },
            { id: 'f2', name: 'index.html', type: 'html', content: '<style>\n  body { font-family: sans-serif; color: #555; }\n</style>\n\n<p style="margin: 20px;">\n  Standard DOM is still accessible beneath the QML canvas layer.\n</p>' },
            { id: 'f3', name: 'script.js', type: 'javascript', content: 'console.log("System components initialized.");' }
        ];

        // Persistence State Initialization
        let parsedFiles = null;
        let storedData = safeGetItem('ide_files');
        if (storedData) {
            try { parsedFiles = JSON.parse(storedData); } catch (e) {}
        }

        let files = parsedFiles || defaultFiles;
        let activeFileId = safeGetItem('ide_active_file') || 'f1';
        let editorInstance = null;
        let isAceActive = false;
        let isLiveMode = false;
        let buildDebounce = null;

        // Vector Asset Compiler Map
        const icons = {
            html: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e34c26" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>',
            css: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#264de4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>',
            js: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f0db4f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h4M8 17h4"></path></svg>',
            qml: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#41cd52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>',
            generic: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#969696" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>',
            close: '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>'
        };

        function getFileIcon(name) {
            if (name.endsWith('.html')) return icons.html;
            if (name.endsWith('.css')) return icons.css;
            if (name.endsWith('.js')) return icons.js;
            if (name.endsWith('.qml')) return icons.qml;
            return icons.generic;
        }

        // Environment Config Handlers
        function toggleTheme(mode) {
            const isLight = mode === 'light';
            document.body.classList.toggle('light-mode', isLight);
            if (isAceActive) {
                editorInstance.setTheme(isLight ? "ace/theme/chrome" : "ace/theme/tomorrow_night_eighties");
            }
        }

        function toggleLiveMode(enabled) {
            isLiveMode = enabled;
            if (isLiveMode) runCode();
        }

        function toggleWordWrap(enabled) {
            if (isAceActive) editorInstance.session.setUseWrapMode(enabled);
            else {
                const el = document.getElementById('fallback-textarea');
                if (el) el.style.whiteSpace = enabled ? 'pre-wrap' : 'pre';
            }
        }

        function changeFontSize(size) {
            if (isAceActive) editorInstance.setFontSize(size);
            else {
                const el = document.getElementById('fallback-textarea');
                if (el) el.style.fontSize = size;
            }
        }

        // Initialize Ace System or Core Fallback Engine
        try {
            if (typeof ace !== 'undefined') {
                editorInstance = ace.edit("editor");
                editorInstance.setTheme("ace/theme/tomorrow_night_eighties");
                editorInstance.setOptions({
                    fontSize: "14px",
                    showPrintMargin: false,
                    enableBasicAutocompletion: true,
                    enableLiveAutocompletion: true
                });
                isAceActive = true;
                systemLog("System Core: Advanced Editor loaded.");
            } else throw new Error("Ace library blocked or offline");
        } catch (e) {
            document.getElementById('editor').innerHTML = '<textarea id="fallback-textarea" spellcheck="false"></textarea>';
            editorInstance = {
                getValue: () => document.getElementById('fallback-textarea').value,
                setValue: (val) => document.getElementById('fallback-textarea').value = val,
                session: { setMode: () => {}, setUseWrapMode: () => {} }
            };
            systemLog("Environment Isolation: Script execution blocked. Fallback operational.");
        }

        function handleEditorChange() {
            const activeFile = files.find(f => f.id === activeFileId);
            if (activeFile && editorInstance) activeFile.content = editorInstance.getValue();
            safeSetItem('ide_files', JSON.stringify(files));
            
            if (isLiveMode) {
                clearTimeout(buildDebounce);
                buildDebounce = setTimeout(runCode, 600);
            }
        }

        if (isAceActive) editorInstance.on("change", handleEditorChange);
        else {
            const el = document.getElementById('fallback-textarea');
            if (el) el.addEventListener('input', handleEditorChange);
        }

        // Core Synchronization Registry
        function syncState() {
            const activeFile = files.find(f => f.id === activeFileId);
            if (activeFile && editorInstance) activeFile.content = editorInstance.getValue();
            safeSetItem('ide_files', JSON.stringify(files));
            safeSetItem('ide_active_file', activeFileId);
            const status = document.getElementById('save-status');
            if (status) {
                status.innerText = "Saved";
                setTimeout(() => { status.innerText = "Synced"; }, 1000);
            }
        }

        // Tab Management Engine
        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            
            files.forEach((file) => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (file.id === activeFileId ? ' active' : '');
                tab.dataset.id = file.id;
                
                const iconWrapper = document.createElement('span');
                iconWrapper.style.display = 'flex';
                iconWrapper.innerHTML = getFileIcon(file.name);

                const nameSpan = document.createElement('span');
                nameSpan.innerText = file.name;
                nameSpan.onclick = () => switchTab(file.id);
                
                const closeBtn = document.createElement('div');
                closeBtn.className = 'close-tab';
                closeBtn.innerHTML = icons.close;
                closeBtn.onclick = (e) => { e.stopPropagation(); closeTab(file.id); };

                tab.appendChild(iconWrapper);
                tab.appendChild(nameSpan);
                tab.appendChild(closeBtn);
                setupDraggableTab(tab, file.id);
                container.appendChild(tab);
            });
        }

        function switchTab(id) {
            syncState();
            activeFileId = id;
            const newFile = files.find(f => f.id === id);
            
            if (isAceActive) {
                let mode = 'text';
                if (newFile.type === 'html' || newFile.name.endsWith('.html')) mode = 'html';
                else if (newFile.type === 'css' || newFile.name.endsWith('.css')) mode = 'css';
                else if (newFile.type === 'javascript' || newFile.name.endsWith('.js')) mode = 'javascript';
                else if (newFile.type === 'qml' || newFile.name.endsWith('.qml')) mode = 'qml';
                
                editorInstance.session.setMode("ace/mode/" + mode);
                editorInstance.setValue(newFile.content, -1);
            } else {
                editorInstance.setValue(newFile.content);
            }
            renderTabs();
            safeSetItem('ide_active_file', activeFileId);
        }

        function promptNewTab() {
            const name = prompt("Enter complete filename (e.g. App.qml):", "Component.qml");
            if (!name) return;
            const newId = 'f' + Date.now();
            let type = 'text';
            if (name.endsWith('.html')) type = 'html';
            else if (name.endsWith('.css')) type = 'css';
            else if (name.endsWith('.js')) type = 'javascript';
            else if (name.endsWith('.qml')) type = 'qml';
            
            files.push({ id: newId, name: name, type: type, content: '' });
            switchTab(newId);
        }

        function closeTab(id) {
            if (files.length <= 1) return alert("System core restriction: Active workspace requires 1 minimum tab.");
            files = files.filter(f => f.id !== id);
            if (activeFileId === id) switchTab(files[0].id);
            else renderTabs();
            syncState();
        }

        function setupDraggableTab(tabElement, fileId) {
            const handleStart = (e) => {
                if(e.target.closest('.close-tab')) return;
                tabElement.classList.add('dragging');
            };
            const handleMove = (e) => {
                if(!tabElement.classList.contains('dragging')) return;
                e.preventDefault(); 
                const clientX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
                const container = document.getElementById('tabs-container');
                const tabs = Array.from(container.querySelectorAll('.tab:not(.dragging)'));
                
                let nextElement = null;
                for(let sibling of tabs) {
                    const rect = sibling.getBoundingClientRect();
                    if(clientX < rect.left + rect.width / 2) {
                        nextElement = sibling;
                        break;
                    }
                }
                if (nextElement) container.insertBefore(tabElement, nextElement);
                else container.appendChild(tabElement);
            };
            const handleEnd = (e) => {
                if(!tabElement.classList.contains('dragging')) return;
                tabElement.classList.remove('dragging');
                const newDOMOrder = Array.from(document.getElementById('tabs-container').children);
                files.sort((a, b) => {
                    return newDOMOrder.findIndex(el => el.dataset.id === a.id) - 
                           newDOMOrder.findIndex(el => el.dataset.id === b.id);
                });
                syncState();
            };

            tabElement.addEventListener('mousedown', handleStart);
            document.addEventListener('mousemove', handleMove, { passive: false });
            document.addEventListener('mouseup', handleEnd);
        }

        const consoleHijackScript = "<script>\n" +
            "(function() {\n" +
            "    const send = (type, args) => {\n" +
            "        const parsedArgs = Array.from(args).map(arg => {\n" +
            "            if(typeof arg === 'object') return JSON.stringify(arg);\n" +
            "            return String(arg);\n" +
            "        });\n" +
            "        window.parent.postMessage({ source: 'live-preview', type: type, args: parsedArgs }, '*');\n" +
            "    };\n" +
            "    const ogLog = console.log, ogWarn = console.warn, ogErr = console.error;\n" +
            "    console.log = function() { send('log', arguments); ogLog.apply(console, arguments); };\n" +
            "    console.warn = function() { send('warn', arguments); ogWarn.apply(console, arguments); };\n" +
            "    console.error = function() { send('error', arguments); ogErr.apply(console, arguments); };\n" +
            "    window.onerror = function(msg, url, line) {\n" +
            "        send('error', [msg + ' (Line ' + line + ')']);\n" +
            "        return false;\n" +
            "    };\n" +
            "})();\n" +
            "</scr" + "ipt>";

        window.addEventListener('message', (event) => {
            if(event.data && event.data.source === 'live-preview') {
                const out = document.getElementById('console-output');
                const logLine = document.createElement('div');
                logLine.className = 'log-line log-' + event.data.type;
                
                // Keep html escaping here for displaying the logs safely in the console UI
                const safeText = String(event.data.args.join(' ')).replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
                );
                
                logLine.innerHTML = '<span>&gt;&nbsp;</span><span>' + safeText + '</span>';
                out.appendChild(logLine);
                out.scrollTop = out.scrollHeight;
            }
        });

        function clearConsole() {
            document.getElementById('console-output').innerHTML = '';
        }

        function systemLog(msg, typeClass = 'log-system') {
            const out = document.getElementById('console-output');
            if(out) {
                out.innerHTML += `<div class="log-line ${typeClass}">${msg}</div>`;
                out.scrollTop = out.scrollHeight;
            }
        }

        async function runCode() {
            syncState();
            clearConsole();
            systemLog('System: Initiating build sequence...');

            let htmlBase = '';
            let cssBlock = '';
            let jsBlock = '';
            
            let mainQmlFile = files.find(f => f.name === 'main.qml') || files.find(f => f.type === 'qml' || f.name.endsWith('.qml'));
            let qmlBlock = '';

            if (mainQmlFile) {
                systemLog(`QML Engine: Targeting ${mainQmlFile.name} for rendering context.`);
                // FIX: Do not escape HTML inside <script> tags. It breaks QML operators. Just escape closing script tags.
                const safeQml = mainQmlFile.content.replace(/<\/script>/gi, "<\\/script>");
                qmlBlock = `<script type="text/qml" id="qml-source-code">${safeQml}<\/script>`;
            }

            files.forEach(f => {
                if(f.type === 'html' || f.name.endsWith('.html')) htmlBase += f.content + '\n';
                if(f.type === 'css' || f.name.endsWith('.css')) cssBlock += f.content + '\n';
                if(f.type === 'javascript' || f.name.endsWith('.js')) jsBlock += f.content + '\n';
            });

            const finalDocument = `
<!DOCTYPE html>
<html>
<head>
    <style>${cssBlock}</style>
    <script type="text/javascript" src="qmlweb.js"><\/script>
    ${consoleHijackScript}
</head>
<body style="margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: transparent;">
    <div id="qml-root" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10;"></div>
    
    <div id="html-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none;">
        ${htmlBase}
    </div>

    ${qmlBlock}

    <script>
        window.addEventListener('load', function() {
            var qmlScript = document.getElementById('qml-source-code');
            if (qmlScript && typeof QmlWeb !== 'undefined') {
                try {
                    var engine = new QmlWeb.QMLEngine(document.getElementById('qml-root'));
                    engine.loadQML(qmlScript.textContent);
                    engine.start();
                    console.log("QML Context Successfully Initialized");
                } catch (e) {
                    console.error("QML Runtime Exception: " + e.message);
                }
            } else if (qmlScript) {
                console.error("Critical: QmlWeb library not loaded. Check CDN connection.");
            }
        });
    <\/script>
    <script>${jsBlock}<\/script>
</body>
</html>`;

            document.getElementById('preview').srcdoc = finalDocument;
        }

        function exportFiles() {
            syncState();
            files.forEach(f => {
                if (!f.content.trim()) return;
                let mime = 'text/plain';
                if (f.type === 'html') mime = 'text/html';
                if (f.type === 'css') mime = 'text/css';
                if (f.type === 'javascript') mime = 'text/javascript';
                if (f.type === 'qml') mime = 'text/x-qml';

                const blob = new Blob([f.content], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = f.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
            systemLog('System Workspace Dump: All assets downloaded.');
        }

        // Startup Trigger
        switchTab(activeFileId);
        runCode();
    </script>
</body>
</html>
